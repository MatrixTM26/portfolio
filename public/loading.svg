<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>

    <!-- ══ GRADIENTS ══ -->

    <!-- Fuselage top -->
    <linearGradient id="gBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="30%"  stop-color="#7dd3fc"/>
      <stop offset="70%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Cockpit canopy -->
    <linearGradient id="gCanopy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#bae6fd"/>
      <stop offset="40%"  stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#075985" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Wing -->
    <linearGradient id="gWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="50%"  stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0c1a4e"/>
    </linearGradient>

    <!-- Engine nozzle -->
    <linearGradient id="gNozzle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Afterburner inner core -->
    <radialGradient id="gFlame1" cx="0%" cy="50%" r="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#bfdbfe"/>
      <stop offset="55%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>

    <!-- Afterburner outer -->
    <radialGradient id="gFlame2" cx="0%" cy="50%" r="100%">
      <stop offset="0%"   stop-color="#93c5fd" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>

    <!-- Contrail -->
    <linearGradient id="gTrail1" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#bae6fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gTrail2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>

    <!-- Missile body -->
    <linearGradient id="gMissile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Panel shading -->
    <linearGradient id="gPanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e0f2fe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.1"/>
    </linearGradient>

  </defs>

  <!-- ══════════════════════════════════════════════
       WHOLE JET — flies left→right, loops back
  ══════════════════════════════════════════════ -->
  <g>
    <!-- Fly from off-left to off-right, looping -->
    <animateTransform attributeName="transform" type="translate"
      values="-350,0; 850,0; -350,0"
      keyTimes="0; 0.72; 1"
      dur="6s" repeatCount="indefinite"/>

    <g transform="translate(0,250)">

      <!-- ══ CONTRAILS (behind engine) ══ -->
      <g>
        <!-- Top contrail -->
        <rect x="-520" y="-7" width="510" height="4" rx="2" fill="url(#gTrail1)" opacity="0.6">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.8s" repeatCount="indefinite"/>
          <animate attributeName="width"   values="480;530;480"  dur="0.8s" repeatCount="indefinite"/>
        </rect>
        <!-- Bottom contrail -->
        <rect x="-520" y="3"  width="510" height="4" rx="2" fill="url(#gTrail2)" opacity="0.6">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.8s" begin="0.15s" repeatCount="indefinite"/>
          <animate attributeName="width"   values="480;530;480"  dur="0.8s" begin="0.15s" repeatCount="indefinite"/>
        </rect>
        <!-- Center fine trail -->
        <rect x="-520" y="-1.5" width="510" height="3" rx="1.5" fill="url(#gTrail1)" opacity="0.4">
          <animate attributeName="width" values="500;560;500" dur="1.1s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- ══ AFTERBURNER FLAMES ══ -->
      <!-- outer bloom -->
      <ellipse cx="-88" cy="0" rx="52" ry="18" fill="url(#gFlame2)">
        <animate attributeName="rx" values="48;60;50;56;48" dur="0.12s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="16;20;15;19;16" dur="0.12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.6;0.9;0.7" dur="0.12s" repeatCount="indefinite"/>
      </ellipse>
      <!-- inner core -->
      <ellipse cx="-76" cy="0" rx="30" ry="10" fill="url(#gFlame1)">
        <animate attributeName="rx" values="28;36;30;33;28" dur="0.09s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="8;12;9;11;8"   dur="0.09s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;1;0.8;1;0.9" dur="0.09s" repeatCount="indefinite"/>
      </ellipse>
      <!-- hot white tip -->
      <ellipse cx="-64" cy="0" rx="10" ry="4" fill="#ffffff" opacity="0.95">
        <animate attributeName="rx" values="9;13;10;12;9" dur="0.07s" repeatCount="indefinite"/>
      </ellipse>

      <!-- ══ ENGINE / NOZZLE ══ -->
      <rect x="-72" y="-10" width="38" height="20" rx="3" fill="url(#gNozzle)"/>
      <!-- nozzle petals -->
      <polygon points="-34,-10 -26,-7 -34,-4" fill="#0f172a"/>
      <polygon points="-34,-4  -26,-1 -34,2"  fill="#1e293b"/>
      <polygon points="-34,2   -26,5  -34,8"  fill="#0f172a"/>
      <polygon points="-34,8   -26,11 -34,12" fill="#1e293b"/>

      <!-- ══ TAIL FINS (vertical stabilizers) ══ -->
      <!-- right tail fin -->
      <polygon points="-60,-12 -20,-40 -20,-14 -60,-10"
        fill="url(#gWing)" stroke="#38bdf8" stroke-width="0.5" opacity="0.9"/>
      <!-- left tail fin (below) -->
      <polygon points="-60,12 -20,40 -20,14 -60,10"
        fill="url(#gWing)" stroke="#38bdf8" stroke-width="0.5" opacity="0.9"/>

      <!-- ══ HORIZONTAL STABILIZERS ══ -->
      <polygon points="-55,-10 -18,-28 -15,-10 -55,-10"
        fill="url(#gWing)" opacity="0.85"/>
      <polygon points="-55,10  -18,28  -15,10  -55,10"
        fill="url(#gWing)" opacity="0.85"/>

      <!-- ══ MAIN DELTA WINGS ══ -->
      <!-- right main wing -->
      <polygon points="30,-12 -60,-12 -42,-68 55,-18"
        fill="url(#gWing)" stroke="#93c5fd" stroke-width="0.7" opacity="0.95"/>
      <!-- left main wing -->
      <polygon points="30,12  -60,12  -42,68  55,18"
        fill="url(#gWing)" stroke="#93c5fd" stroke-width="0.7" opacity="0.95"/>

      <!-- Wing leading edge highlight -->
      <line x1="55" y1="-18" x2="-42" y2="-68" stroke="#bae6fd" stroke-width="1" opacity="0.5"/>
      <line x1="55" y1="18"  x2="-42" y2="68"  stroke="#bae6fd" stroke-width="1" opacity="0.5"/>

      <!-- ══ MISSILES (under wing) ══ -->
      <!-- right missile -->
      <g transform="translate(-10,-40)">
        <rect x="-22" y="-3" width="38" height="6" rx="3" fill="url(#gMissile)"/>
        <polygon points="16,-3 22,0 16,3" fill="#94a3b8"/>
        <polygon points="-22,-3 -30,-8 -28,-3" fill="#475569"/>
        <polygon points="-22,3  -30,8  -28,3"  fill="#475569"/>
      </g>
      <!-- left missile -->
      <g transform="translate(-10,40)">
        <rect x="-22" y="-3" width="38" height="6" rx="3" fill="url(#gMissile)"/>
        <polygon points="16,-3 22,0 16,3" fill="#94a3b8"/>
        <polygon points="-22,-3 -30,-8 -28,-3" fill="#475569"/>
        <polygon points="-22,3  -30,8  -28,3"  fill="#475569"/>
      </g>

      <!-- ══ FUSELAGE ══ -->
      <!-- main body -->
      <path d="M 175,0 C 160,-4 120,-10 60,-12 L -70,-12 C -70,-10 -70,10 -70,12 L 60,12 C 120,10 160,4 175,0 Z"
        fill="url(#gBody)" stroke="#38bdf8" stroke-width="0.5"/>

      <!-- fuselage panel lines -->
      <line x1="-40" y1="-11" x2="100" y2="-8" stroke="#bae6fd" stroke-width="0.4" opacity="0.3"/>
      <line x1="-40" y1="11"  x2="100" y2="8"  stroke="#bae6fd" stroke-width="0.4" opacity="0.3"/>
      <line x1="20"  y1="-10" x2="20"  y2="10" stroke="#93c5fd" stroke-width="0.4" opacity="0.25"/>
      <line x1="60"  y1="-12" x2="60"  y2="12" stroke="#93c5fd" stroke-width="0.4" opacity="0.25"/>
      <line x1="100" y1="-9"  x2="100" y2="9"  stroke="#93c5fd" stroke-width="0.4" opacity="0.25"/>

      <!-- ══ NOSE CONE ══ -->
      <path d="M 175,0 C 190,-1 220,0 260,0" fill="none" stroke="url(#gBody)" stroke-width="1"/>
      <path d="M 175,-3 L 265,0 L 175,3 Z" fill="url(#gBody)"/>
      <!-- nose tip -->
      <line x1="240" y1="0" x2="268" y2="0" stroke="#e0f2fe" stroke-width="1.5"/>

      <!-- ══ AIR INTAKES ══ -->
      <!-- right intake -->
      <path d="M 60,-12 C 70,-16 90,-18 110,-17 L 110,-12 L 60,-12 Z"
        fill="#0c1a4e" stroke="#38bdf8" stroke-width="0.5"/>
      <ellipse cx="85" cy="-15" rx="12" ry="2.5" fill="#1e3a8a"/>
      <!-- left intake -->
      <path d="M 60,12 C 70,16 90,18 110,17 L 110,12 L 60,12 Z"
        fill="#0c1a4e" stroke="#38bdf8" stroke-width="0.5"/>
      <ellipse cx="85" cy="15" rx="12" ry="2.5" fill="#1e3a8a"/>

      <!-- ══ COCKPIT CANOPY ══ -->
      <path d="M 100,-10 C 118,-22 148,-20 165,-8 L 165,8 C 148,20 118,22 100,10 Z"
        fill="url(#gCanopy)" stroke="#7dd3fc" stroke-width="0.8" opacity="0.92"/>
      <!-- canopy frame -->
      <line x1="100" y1="-10" x2="165" y2="-6"  stroke="#bae6fd" stroke-width="0.7" opacity="0.6"/>
      <line x1="132" y1="-18" x2="132" y2="18"   stroke="#bae6fd" stroke-width="0.5" opacity="0.4"/>
      <!-- canopy highlight -->
      <path d="M 108,-14 C 120,-20 148,-18 158,-10" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>

      <!-- ══ PITOT TUBE ══ -->
      <rect x="240" y="-1" width="22" height="2" rx="1" fill="#94a3b8"/>

      <!-- ══ FORMATION LIGHT (wingtip) — blinking ══ -->
      <circle cx="-42" cy="-68" r="2.5" fill="#38bdf8">
        <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-42" cy="68" r="2.5" fill="#22d3ee">
        <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>
      </circle>

    </g><!-- end translate(0,250) -->
  </g><!-- end translate animation -->

  <!-- ══════════════════════════════════════════════
       SPEED LINES (fixed in scene, fade as jet passes)
  ══════════════════════════════════════════════ -->
  <g opacity="0.18">
    <line x1="0" y1="180" x2="800" y2="180" stroke="#38bdf8" stroke-width="0.7" stroke-dasharray="40 60"/>
    <line x1="0" y1="220" x2="800" y2="220" stroke="#7dd3fc" stroke-width="0.5" stroke-dasharray="30 80"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#38bdf8" stroke-width="0.6" stroke-dasharray="50 50"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#7dd3fc" stroke-width="0.5" stroke-dasharray="30 80"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#38bdf8" stroke-width="0.7" stroke-dasharray="40 60"/>
  </g>

</svg>
