<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="80" height="80">
  <defs>

    <!-- ── Gradients ── -->
    <linearGradient id="gCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7df9ff"/>
      <stop offset="100%" stop-color="#005fff"/>
    </linearGradient>

    <linearGradient id="gR1a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#0044dd"/>
    </linearGradient>

    <linearGradient id="gR2a" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#0033bb"/>
    </linearGradient>

    <linearGradient id="gR3a" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffee"/>
      <stop offset="100%" stop-color="#0022aa"/>
    </linearGradient>

    <!-- ── Glow filters ── -->
    <filter id="fCore" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="fR1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="fR2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="fR3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!--
      Hexagonal segment shape (reused via use):
      Tip radius inner=r, outer=R, angular span=50° (gap=10°)
      Precomputed for each ring at rotation=0, pointing up.
      Ring 1: inner=62, outer=88    → thin band
      Ring 2: inner=100, outer=135  → medium band
      Ring 3: inner=148, outer=190  → wide band
    -->

    <!-- Ring 1 segment: inner r=62, outer R=88, half-angle=25° -->
    <polygon id="seg1"
      points="
        26.2,-56.2  37.2,-79.8
        0,-88       -37.2,-79.8
        -26.2,-56.2 0,-62
      "
      fill="url(#gR1a)"/>

    <!-- Ring 2 segment: inner r=100, outer R=135, half-angle=25° -->
    <polygon id="seg2"
      points="
        42.3,-91.3  57.1,-123.3
        0,-135      -57.1,-123.3
        -42.3,-91.3 0,-100
      "
      fill="url(#gR2a)"/>

    <!-- Ring 3 segment: inner r=148, outer R=190, half-angle=25° -->
    <polygon id="seg3"
      points="
        62.5,-135.3  80.3,-173.7
        0,-190       -80.3,-173.7
        -62.5,-135.3 0,-148
      "
      fill="url(#gR3a)"/>

  </defs>

  <!-- ════════════════════════════════ -->
  <!--  RING 3  ·  CW  ·  16s         -->
  <!-- ════════════════════════════════ -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="360" dur="16s" repeatCount="indefinite" additive="sum"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88" transform="rotate(60)"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88" transform="rotate(120)"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88" transform="rotate(180)"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88" transform="rotate(240)"/>
    <use href="#seg3" filter="url(#fR3)" opacity="0.88" transform="rotate(300)"/>
  </g>

  <!-- ════════════════════════════════ -->
  <!--  RING 2  ·  CCW  ·  10s        -->
  <!-- ════════════════════════════════ -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="-360" dur="10s" repeatCount="indefinite" additive="sum"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93" transform="rotate(60)"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93" transform="rotate(120)"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93" transform="rotate(180)"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93" transform="rotate(240)"/>
    <use href="#seg2" filter="url(#fR2)" opacity="0.93" transform="rotate(300)"/>
  </g>

  <!-- ════════════════════════════════ -->
  <!--  RING 1  ·  CW  ·  6s          -->
  <!-- ════════════════════════════════ -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="360" dur="6s" repeatCount="indefinite" additive="sum"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1" transform="rotate(60)"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1" transform="rotate(120)"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1" transform="rotate(180)"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1" transform="rotate(240)"/>
    <use href="#seg1" filter="url(#fR1)" opacity="1" transform="rotate(300)"/>
  </g>

  <!-- ════════════════════════════════ -->
  <!--  CORE  ·  static + pulse        -->
  <!-- ════════════════════════════════ -->
  <g transform="translate(250,250)" filter="url(#fCore)">
    <!-- Halo pulse -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
      fill="#00aaff">
      <animate attributeName="opacity" values="0.08;0.22;0.08" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Main core fill -->
    <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21"
      fill="url(#gCore)">
      <animate attributeName="opacity" values="0.82;1;0.82" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner highlight -->
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
      fill="#cff9ff" opacity="0.18"/>
  </g>

  <!-- Core center dot -->
  <circle cx="250" cy="250" r="5" fill="#ffffff" filter="url(#fCore)">
    <animate attributeName="r"       values="4;7;4"     dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ════════════════════════════════ -->
  <!--  OUTER HEX FRAME (satu-satunya) -->
  <!-- ════════════════════════════════ -->
  <polygon
    points="250,30 443,132 443,368 250,470 57,368 57,132"
    fill="none"
    stroke="#0055cc"
    stroke-width="1"
    stroke-dasharray="72 18"
    opacity="0.45"/>

  <!-- 6 vertex dots -->
  <circle cx="250" cy="30"  r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0s"    repeatCount="indefinite"/></circle>
  <circle cx="443" cy="132" r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.6s"  repeatCount="indefinite"/></circle>
  <circle cx="443" cy="368" r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1.2s"  repeatCount="indefinite"/></circle>
  <circle cx="250" cy="470" r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="1.8s"  repeatCount="indefinite"/></circle>
  <circle cx="57"  cy="368" r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="2.4s"  repeatCount="indefinite"/></circle>
  <circle cx="57"  cy="132" r="2.5" fill="#00eeff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="3.0s"  repeatCount="indefinite"/></circle>

</svg>
