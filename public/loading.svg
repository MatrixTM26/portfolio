<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>

    <!-- GRADIENTS -->
    <radialGradient id="gNucleus" cx="35%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="18%"  stop-color="#e0c3ff"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="80%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#060420"/>
    </radialGradient>

    <radialGradient id="gHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gO1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#38bdf8"/>
      <stop offset="78%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="gO2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#6366f1"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="78%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="gO3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#2dd4bf"/>
      <stop offset="78%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="gE1" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gE2" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gE3" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>

    <!-- FILTERS -->
    <filter id="fNuc" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="13" result="b1"/>
      <feGaussianBlur stdDeviation="4"  result="b2" in="SourceGraphic"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fOrb" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fE" x="-500%" y="-500%" width="1100%" height="1100%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fTrail" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="fCloud" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="fRim" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ══════════════════════════════════════
       PROBABILITY CLOUD (quantum orbitals)
  ══════════════════════════════════════ -->
  <g transform="translate(300,300)" opacity="0.10">
    <circle r="92"  fill="#a855f7" filter="url(#fCloud)"/>
    <circle r="148" fill="#3b82f6" filter="url(#fCloud)"/>
    <circle r="200" fill="#06b6d4" filter="url(#fCloud)"/>
  </g>

  <!-- ══════════════════════════════════════
       ORBIT 1 — equatorial plane
       Ellipse: rx=215, ry=60
       Electron: CW 7s
  ══════════════════════════════════════ -->
  <g transform="translate(300,300)">
    <!-- back arc (dimmer, behind nucleus) -->
    <path d="M -215,0 A 215,60 0 0,0 215,0"
      fill="none" stroke="url(#gO1)" stroke-width="1.8" opacity="0.22" filter="url(#fOrb)"/>
    <!-- front arc -->
    <path d="M -215,0 A 215,60 0 0,1 215,0"
      fill="none" stroke="url(#gO1)" stroke-width="2.5" opacity="0.9" filter="url(#fOrb)"/>

    <!-- electron 1 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
      <!-- trail glow -->
      <circle cx="215" cy="0" r="18" fill="#3b82f6" opacity="0.2" filter="url(#fTrail)"/>
      <!-- electron body -->
      <circle cx="215" cy="0" r="7"  fill="url(#gE1)" filter="url(#fE)"/>
      <circle cx="215" cy="0" r="2.8" fill="#ffffff"/>
    </g>
  </g>

  <!-- ══════════════════════════════════════
       ORBIT 2 — tilted 60°
       Ellipse: rx=200, ry=56
       Electron: CCW 11s
  ══════════════════════════════════════ -->
  <g transform="translate(300,300) rotate(60)">
    <path d="M -200,0 A 200,56 0 0,0 200,0"
      fill="none" stroke="url(#gO2)" stroke-width="1.8" opacity="0.22" filter="url(#fOrb)"/>
    <path d="M -200,0 A 200,56 0 0,1 200,0"
      fill="none" stroke="url(#gO2)" stroke-width="2.5" opacity="0.9" filter="url(#fOrb)"/>

    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="11s" repeatCount="indefinite"/>
      <circle cx="200" cy="0" r="17" fill="#6366f1" opacity="0.2" filter="url(#fTrail)"/>
      <circle cx="200" cy="0" r="7"  fill="url(#gE2)" filter="url(#fE)"/>
      <circle cx="200" cy="0" r="2.8" fill="#ffffff"/>
    </g>
  </g>

  <!-- ══════════════════════════════════════
       ORBIT 3 — tilted 120°
       Ellipse: rx=188, ry=52
       Electron: CW 15s
  ══════════════════════════════════════ -->
  <g transform="translate(300,300) rotate(120)">
    <path d="M -188,0 A 188,52 0 0,0 188,0"
      fill="none" stroke="url(#gO3)" stroke-width="1.8" opacity="0.22" filter="url(#fOrb)"/>
    <path d="M -188,0 A 188,52 0 0,1 188,0"
      fill="none" stroke="url(#gO3)" stroke-width="2.5" opacity="0.9" filter="url(#fOrb)"/>

    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      <circle cx="188" cy="0" r="16" fill="#0891b2" opacity="0.2" filter="url(#fTrail)"/>
      <circle cx="188" cy="0" r="7"  fill="url(#gE3)" filter="url(#fE)"/>
      <circle cx="188" cy="0" r="2.8" fill="#ffffff"/>
    </g>
  </g>

  <!-- ══════════════════════════════════════
       NUCLEUS
  ══════════════════════════════════════ -->

  <!-- outer energy halo pulses -->
  <circle cx="300" cy="300" r="60" fill="url(#gHalo)" filter="url(#fCloud)">
    <animate attributeName="r"       values="50;72;50"     dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="300" r="40" fill="url(#gHalo)" filter="url(#fCloud)">
    <animate attributeName="r"       values="32;50;32"       dur="2.9s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.2;0.9"    dur="2.9s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- nucleus sphere -->
  <g transform="translate(300,300)" filter="url(#fNuc)">
    <!-- rim glow ring -->
    <circle r="43" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.7" filter="url(#fRim)"/>
    <circle r="43" fill="none" stroke="#22d3ee" stroke-width="1"   opacity="0.4"/>

    <!-- main sphere -->
    <circle r="38" fill="url(#gNucleus)">
      <animate attributeName="r" values="36;41;36" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- equatorial band — gives 3D depth -->
    <ellipse cx="0" cy="3" rx="38" ry="9"
      fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.45"/>

    <!-- sub-rings -->
    <circle r="26" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.3"/>
    <circle r="15" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.35"/>

    <!-- specular highlight -->
    <ellipse cx="-11" cy="-14" rx="12" ry="8" fill="white" opacity="0.22"/>
    <ellipse cx="-13" cy="-16" rx="5.5" ry="3.5" fill="white" opacity="0.38"/>

    <!-- nucleus core bright point -->
    <circle r="6.5" fill="white" opacity="0.95">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" fill="white"/>
  </g>

  <!-- ══════════════════════════════════════
       OUTER BOUNDARY — quantum shell hint
  ══════════════════════════════════════ -->
  <circle cx="300" cy="300" r="250"
    fill="none" stroke="#4f46e5"
    stroke-width="0.7" stroke-dasharray="4 20" opacity="0.28"/>

  <!-- 12 node dots -->
  <g transform="translate(300,300)">
    <circle cy="-250" r="1.8" fill="#c4b5fd">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="0s"    repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(30)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="0.5s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#c4b5fd" transform="rotate(60)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="1.0s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(90)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="1.5s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#c4b5fd" transform="rotate(120)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="2.0s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(150)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="2.5s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#c4b5fd" transform="rotate(180)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="3.0s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(210)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="3.5s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#c4b5fd" transform="rotate(240)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="4.0s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(270)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="4.5s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#c4b5fd" transform="rotate(300)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="5.0s"  repeatCount="indefinite"/>
    </circle>
    <circle cy="-250" r="1.8" fill="#67e8f9" transform="rotate(330)">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="6s" begin="5.5s"  repeatCount="indefinite"/>
    </circle>
  </g>

</svg>
