<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="80" height="80">
  <defs>

    <linearGradient id="gradCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0050ff"/>
    </linearGradient>

    <linearGradient id="gradRing1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="50%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#003bcc"/>
    </linearGradient>

    <linearGradient id="gradRing2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e8ff"/>
      <stop offset="50%" stop-color="#0055cc"/>
      <stop offset="100%" stop-color="#00b4ff"/>
    </linearGradient>

    <linearGradient id="gradRing3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffee"/>
      <stop offset="50%" stop-color="#0033aa"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>

    <filter id="glowCore" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowRing1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowRing2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowRing3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- RING 3 — CW, 14s, no delay -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 0 0" to="360 0 0" dur="14s" begin="0s"
      repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-250,-250)">
      <g transform="translate(250,250)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
      <g transform="translate(250,250) rotate(60)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
      <g transform="translate(250,250) rotate(120)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
      <g transform="translate(250,250) rotate(180)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
      <g transform="translate(250,250) rotate(240)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
      <g transform="translate(250,250) rotate(300)"><polygon points="0,-190 55,-160 55,-105 0,-135" fill="url(#gradRing3)" opacity="0.9" filter="url(#glowRing3)"/></g>
    </g>
  </g>

  <!-- RING 2 — CW, 9s, delay 2s -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 0 0" to="360 0 0" dur="9s" begin="2s"
      repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-250,-250)">
      <g transform="translate(250,250)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
      <g transform="translate(250,250) rotate(60)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
      <g transform="translate(250,250) rotate(120)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
      <g transform="translate(250,250) rotate(180)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
      <g transform="translate(250,250) rotate(240)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
      <g transform="translate(250,250) rotate(300)"><polygon points="0,-135 40,-112 40,-72 0,-90" fill="url(#gradRing2)" opacity="0.95" filter="url(#glowRing2)"/></g>
    </g>
  </g>

  <!-- RING 1 — CW, 5s, delay 4s -->
  <g transform="translate(250,250)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 0 0" to="360 0 0" dur="5s" begin="4s"
      repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-250,-250)">
      <g transform="translate(250,250)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
      <g transform="translate(250,250) rotate(60)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
      <g transform="translate(250,250) rotate(120)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
      <g transform="translate(250,250) rotate(180)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
      <g transform="translate(250,250) rotate(240)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
      <g transform="translate(250,250) rotate(300)"><polygon points="0,-88 28,-70 28,-45 0,-60" fill="url(#gradRing1)" opacity="1" filter="url(#glowRing1)"/></g>
    </g>
  </g>

  <!-- CORE — pulsing, no stroke -->
  <g transform="translate(250,250)">
    <polygon points="0,-55 47.6,-27.5 47.6,27.5 0,55 -47.6,27.5 -47.6,-27.5"
      fill="#0080ff" filter="url(#glowCore)">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"
      fill="url(#gradCore)" filter="url(#glowCore)">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
      fill="#00f0ff" opacity="0.2"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glowCore)">
      <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- OUTER HEX FRAME -->
  <polygon
    points="250,28 445,133 445,367 250,472 55,367 55,133"
    fill="none"
    stroke="#0066cc"
    stroke-width="1.2"
    opacity="0.5"
    stroke-dasharray="80 20"/>

  <!-- Titik sudut -->
  <circle cx="250" cy="28"  r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0s"   repeatCount="indefinite"/></circle>
  <circle cx="445" cy="133" r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="445" cy="367" r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1s"   repeatCount="indefinite"/></circle>
  <circle cx="250" cy="472" r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="55"  cy="367" r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="2s"   repeatCount="indefinite"/></circle>
  <circle cx="55"  cy="133" r="3" fill="#00f5ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="2.5s" repeatCount="indefinite"/></circle>

</svg>
