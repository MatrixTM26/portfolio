<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Core: violet → cyan -->
    <radialGradient id="gCore" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#e0aaff"/>
      <stop offset="40%"  stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#003aff"/>
    </radialGradient>

    <!-- Core inner shine -->
    <radialGradient id="gCoreShine" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring 1: indigo → cyan -->
    <linearGradient id="gR1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Ring 2: purple → blue -->
    <linearGradient id="gR2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Ring 3: deep violet → teal -->
    <linearGradient id="gR3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Stroke gradient for outer frame -->
    <linearGradient id="gFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.6"/>
    </linearGradient>

    <!-- ══════════════════════════════════
         FILTERS
    ══════════════════════════════════ -->

    <!-- Core glow — intense -->
    <filter id="fCore" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feGaussianBlur stdDeviation="20" result="b2" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ring 1 glow -->
    <filter id="fR1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Ring 2 glow -->
    <filter id="fR2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Ring 3 glow -->
    <filter id="fR3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for dots/particles -->
    <filter id="fDot" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ══════════════════════════════════
         SEGMENT SYMBOLS
         Geometry: true hexagonal arc segments
         each spanning 50° (gap 10° between)
         Computed: sin/cos at ±25°
         sin25°=0.4226  cos25°=0.9063
    ══════════════════════════════════ -->

    <!--
      Ring 1: inner=68, outer=96
      outer pts: ±25° on R=96 → (±40.6, -87.0)
      inner pts: ±25° on r=68 → (±28.7, -61.6)
    -->
    <polygon id="s1"
      points="0,-96  40.6,-87.0  28.7,-61.6  0,-68  -28.7,-61.6  -40.6,-87.0"
      fill="url(#gR1)"/>

    <!--
      Ring 2: inner=112, outer=148
      outer pts: ±25° on R=148 → (±62.5, -134.1)
      inner pts: ±25° on r=112 → (±47.3, -101.5)
    -->
    <polygon id="s2"
      points="0,-148  62.5,-134.1  47.3,-101.5  0,-112  -47.3,-101.5  -62.5,-134.1"
      fill="url(#gR2)"/>

    <!--
      Ring 3: inner=162, outer=208
      outer pts: ±25° on R=208 → (±87.9, -188.5)
      inner pts: ±25° on r=162 → (±68.5, -146.8)
    -->
    <polygon id="s3"
      points="0,-208  87.9,-188.5  68.5,-146.8  0,-162  -68.5,-146.8  -87.9,-188.5"
      fill="url(#gR3)"/>

    <!-- Particle dot (small glowing orb) -->
    <circle id="dot" r="3.5" fill="#e0f2fe"/>

  </defs>

  <!-- ══════════════════════════════════════════
       RING 3  ·  CW  ·  18s
  ══════════════════════════════════════════ -->
  <g transform="translate(300,300)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="360" dur="18s" repeatCount="indefinite" additive="sum"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)" transform="rotate(60)"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)" transform="rotate(120)"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)" transform="rotate(180)"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)" transform="rotate(240)"/>
    <use href="#s3" opacity="0.82" filter="url(#fR3)" transform="rotate(300)"/>
  </g>

  <!-- ══════════════════════════════════════════
       RING 2  ·  CCW  ·  11s
  ══════════════════════════════════════════ -->
  <g transform="translate(300,300)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="-360" dur="11s" repeatCount="indefinite" additive="sum"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)" transform="rotate(60)"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)" transform="rotate(120)"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)" transform="rotate(180)"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)" transform="rotate(240)"/>
    <use href="#s2" opacity="0.90" filter="url(#fR2)" transform="rotate(300)"/>
  </g>

  <!-- ══════════════════════════════════════════
       RING 1  ·  CW  ·  7s
  ══════════════════════════════════════════ -->
  <g transform="translate(300,300)">
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="360" dur="7s" repeatCount="indefinite" additive="sum"/>
    <use href="#s1" opacity="1" filter="url(#fR1)"/>
    <use href="#s1" opacity="1" filter="url(#fR1)" transform="rotate(60)"/>
    <use href="#s1" opacity="1" filter="url(#fR1)" transform="rotate(120)"/>
    <use href="#s1" opacity="1" filter="url(#fR1)" transform="rotate(180)"/>
    <use href="#s1" opacity="1" filter="url(#fR1)" transform="rotate(240)"/>
    <use href="#s1" opacity="1" filter="url(#fR1)" transform="rotate(300)"/>
  </g>

  <!-- ══════════════════════════════════════════
       ORBITING PARTICLES on Ring 2 midline r=130
       6 dots, opposite direction to ring 2 (CW)
  ══════════════════════════════════════════ -->
  <g transform="translate(300,300)">
    <animateTransform attributeName="transform" type="rotate"
      from="30" to="390" dur="11s" repeatCount="indefinite" additive="sum"/>
    <!-- dots sit at 30° offsets (between segments) at r=130 -->
    <use href="#dot" transform="translate(0,-130)"   filter="url(#fDot)" opacity="0.9"/>
    <use href="#dot" transform="rotate(60)  translate(0,-130)" filter="url(#fDot)" opacity="0.9"/>
    <use href="#dot" transform="rotate(120) translate(0,-130)" filter="url(#fDot)" opacity="0.9"/>
    <use href="#dot" transform="rotate(180) translate(0,-130)" filter="url(#fDot)" opacity="0.9"/>
    <use href="#dot" transform="rotate(240) translate(0,-130)" filter="url(#fDot)" opacity="0.9"/>
    <use href="#dot" transform="rotate(300) translate(0,-130)" filter="url(#fDot)" opacity="0.9"/>
  </g>

  <!-- ══════════════════════════════════════════
       CORE
  ══════════════════════════════════════════ -->
  <g transform="translate(300,300)" filter="url(#fCore)">
    <!-- Outer halo pulse -->
    <polygon points="0,-58 50.2,-29 50.2,29 0,58 -50.2,29 -50.2,-29"
      fill="#6d28d9">
      <animate attributeName="opacity" values="0.05;0.20;0.05" dur="3.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Main hex fill -->
    <polygon points="0,-46 39.8,-23 39.8,23 0,46 -39.8,23 -39.8,-23"
      fill="url(#gCore)">
      <animate attributeName="opacity" values="0.88;1;0.88" dur="3.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner shine -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
      fill="url(#gCoreShine)"/>
  </g>

  <!-- Core center star-dot -->
  <circle cx="300" cy="300" r="4.5" fill="#f0f9ff" filter="url(#fCore)">
    <animate attributeName="r"       values="3.5;6.5;3.5" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"   dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════
       OUTER FRAME — single hex, dashed
  ══════════════════════════════════════════ -->
  <polygon
    points="300,32 518,147 518,453 300,568 82,453 82,147"
    fill="none"
    stroke="url(#gFrame)"
    stroke-width="1"
    stroke-dasharray="68 22"
    opacity="0.5"/>

  <!-- Frame vertex glows -->
  <circle cx="300" cy="32"  r="2.5" fill="#c4b5fd" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="0s"    repeatCount="indefinite"/></circle>
  <circle cx="518" cy="147" r="2.5" fill="#93c5fd" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="0.7s"  repeatCount="indefinite"/></circle>
  <circle cx="518" cy="453" r="2.5" fill="#67e8f9" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="1.4s"  repeatCount="indefinite"/></circle>
  <circle cx="300" cy="568" r="2.5" fill="#c4b5fd" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="2.1s"  repeatCount="indefinite"/></circle>
  <circle cx="82"  cy="453" r="2.5" fill="#93c5fd" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="2.8s"  repeatCount="indefinite"/></circle>
  <circle cx="82"  cy="147" r="2.5" fill="#67e8f9" filter="url(#fDot)"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="3.5s"  repeatCount="indefinite"/></circle>

</svg>
